<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
    <title>Formulário Cadastro de Clientes</title>
</head>
<body>

    <main class="main-container">
        <header>
            <h1>Formulário Cadastro de Clientes</h1>
        </header>

        <form class="form-body" id="cadastroForm">
            <fieldset>
                <legend>Dados Pessoais</legend>
                
                <div class="form-group">
                    <label for="nome">Nome Completo <span class="required-field" aria-hidden="true">*</span></label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required aria-required="true">
                </div>

                <div class="form-row">
                    <div class="form-group">
                    <label for="cpf">CPF <span class="required" aria-hidden="true">*</span></label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="purchase_date">Data de Nascimento <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="date" id="purchase_date" name="purchase_date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Endereço</legend>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="cep">CEP <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                    </div>
                    <div class="form-group">
                        <label for="numero">Número <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="text" id="numero" name="numero" placeholder="Ex: 123">
                    </div>
                </div>

                <div class="form-group">
                    <label for="rua">Rua  <span class="required-field" aria-hidden="true">*</span></label>
                    <input type="text" id="rua" name="rua" placeholder="Aguardando CEP...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bairro">Bairro  <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="text" id="bairro" name="bairro">
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade  <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="text" id="cidade" name="cidade">
                    </div>
                    <div class="form-group uf">
                        <label for="estado">UF <span class="required-field" aria-hidden="true">*</span></label>
                        <input type="text" id="estado" name="estado" maxlength="2">
                    </div>
                </div>
            </fieldset>

            <div class="actions">
                <button type="submit" class="btn-save">SALVAR CADASTRO</button>
            </div>
        </form>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <h1 id="titulo">Cadastro de Cliente</h1>

  <form aria-labelledby="titulo">

    <!-- DADOS PESSOAIS -->
    <fieldset>
      <legend>Dados Pessoais</legend>

      <label>
        Nome <span class="required-field" aria-hidden="true">*</span>
        <input name="nome" type="text" required >
      </label>

      <p>
        <label>
          CPF <span class="required-field" aria-hidden="true">*</span>
          <input name="cpf" type="text" required >
        </label>

        <label>
          Nascimento <span class="required-field" aria-hidden="true">*</span>
          <input name="nascimento" type="date" required >
        </label>
      </p>
    </fieldset>

    <!-- CONTATO -->
    <fieldset>
      <legend>Contato</legend>

      <p>
        <label>
          E-mail <span class="required-field" aria-hidden="true">*</span>
          <input name="email" type="email" required >
        </label>

        <label>
          Telefone <span class="required-field" aria-hidden="true">*</span>
          <input name="telefone" type="tel" required >
        </label>
      </p>
    </fieldset>

    <!-- ENDEREÇO -->
    <fieldset>
      <legend>Endereço</legend>

      <p>
        <label>
          CEP <span class="required-field" aria-hidden="true">*</span>
          <input name="cep" type="text" required >
        </label>

        <label>
          Número <span class="required-field" aria-hidden="true">*</span>
          <input name="numero" type="text" required >
        </label>
      </p>

      <label>
        Rua <span class="required-field" aria-hidden="true">*</span>
        <input name="rua" type="text" required >
      </label>

      <p>
        <label>
          Cidade <span class="required-field" aria-hidden="true">*</span>
          <input name="cidade" type="text" required >
        </label>

        <label>
          UF <span class="required-field" aria-hidden="true">*</span>
          <input name="estado" type="text" maxlength="2" required >
        </label>
      </p>
    </fieldset>

    <button type="submit">Salvar Cadastro</button>

  </form>
</main>

</body>
</html>
